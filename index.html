<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite SQL Lab — Learn SQL by running it</title>
  <meta name="description" content="A hands-on, beginner-friendly SQL course. Read a concept, run real queries in your browser, and get instant correct/incorrect feedback — no setup, no prior knowledge needed." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- CodeMirror (progressive enhancement for the editors) — vendored locally -->
  <link rel="stylesheet" href="vendor/codemirror.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Boot splash -->
  <div id="boot">
    <div class="logo">QuickBite <span class="dot">·</span> SQL Lab</div>
    <div class="spin" role="status" aria-label="Loading"></div>
    <div class="msg" id="boot-msg">Starting the database engine…</div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle lessons menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      QuickBite <span class="dot">·</span> SQL Lab
      <span class="sub">learn SQL by running it</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-meta">Dataset: <b>QuickBite</b> · SQLite in your browser</div>
    <button class="btn-tables" id="tablesBtn" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Tables
    </button>
  </header>

  <!-- Layout -->
  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Lessons"></aside>
    <main class="main" id="main" tabindex="-1"></main>
  </div>

  <div class="scrim" id="scrim"></div>

  <!-- Tables modal -->
  <div class="modal-overlay" id="tablesModal" role="dialog" aria-modal="true" aria-label="Dataset tables">
    <div class="modal">
      <div class="modal-head">
        <h2>The QuickBite dataset</h2>
        <button class="x" id="modalClose" aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Engine + editor libraries — vendored locally (work offline after first load) -->
  <script src="vendor/sql-wasm.js"></script>
  <script src="vendor/codemirror.js"></script>
  <script src="vendor/codemirror-sql-mode.js"></script>

  <!-- App data + logic -->
  <script src="db.js"></script>
  <script src="lessons.js"></script>
  <script src="app.js"></script>
</body>
</html>
